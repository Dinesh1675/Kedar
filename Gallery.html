    <style>
        body{
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
         ul{
            list-style-type: none;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: rgba(0, 0, 0, 0.7);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1;
        }
        ul a{
            display: block;
            color: #fff;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
            float: left;
        }
        ul a:hover{
            background-color: #111;
        }
        h1{ 
            margin-top: 40px;
            margin: 20px 0; 
        }
        .slideshow{
            width: 95%;
            max-width: 1000px;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            background: #000;
        }
        .slides{
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            min-height: 300px;
        }
        .slides img{
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            animation: fade 18s linear infinite;
            animation-fill-mode: both;
        }
        /* stagger start so each image shows for 3s in an 18s loop */
        .slides img:nth-child(1){ animation-delay: -0s; }
        .slides img:nth-child(2){ animation-delay: -3s; }
        .slides img:nth-child(3){ animation-delay: -6s; }
        .slides img:nth-child(4){ animation-delay: -9s; }
        .slides img:nth-child(5){ animation-delay: -12s; }
        .slides img:nth-child(6){ animation-delay: -15s; }

        @keyframes fade{
            0%   { opacity: 1 }
            14.166% { opacity: 1 }
            16.666% { opacity: 0 }
            100% { opacity: 0 }
        }

        @media (max-width:600px){
            .slides{ aspect-ratio: 4/4; }
        }
        
        

         .btn{
            display: inline-block;
            padding: 10px 20px;
            background-color: #ffdf4f;
            color: #000000;
            text-decoration: none;
            border-radius: 5px;
            font-size: 15px;
            font-weight: bold;
            margin: 10px;

        }
